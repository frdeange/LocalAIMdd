# ──────────────────────────────────────────────────────────────
# Docker Compose - BMS Operations PoC
# ──────────────────────────────────────────────────────────────
# Minimal setup for prototyping: Ollama LLM only.
# Additional services (API, BMS, STT/TTS, MCPs) will be added
# incrementally as the project progresses.
#
# Usage:
#   docker compose --profile gpu up -d    # Start with GPU
#   docker compose --profile cpu up -d    # Start CPU-only
#   docker compose down                   # Stop services
#   docker compose logs -f ollama-gpu     # Follow Ollama logs
#
# Verify:
#   docker compose exec ollama-gpu ollama list
#   curl http://localhost:11434/api/tags
# ──────────────────────────────────────────────────────────────

services:
  # ── Ollama (GPU mode) ──────────────────────────────────────
  # Pinned to 0.15.6: Ollama 0.16.x has a 30-second GPU discovery timeout
  # that is too short for WSL2 CUDA cold-start on some hardware.
  ollama-gpu:
    image: ollama/ollama:0.15.6
    container_name: bms-ollama
    profiles: ["gpu"]
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Ollama (CPU mode) ──────────────────────────────────────
  ollama-cpu:
    image: ollama/ollama:latest
    container_name: bms-ollama
    profiles: ["cpu"]
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Ollama Model Init (one-shot) ───────────────────────────
  ollama-init:
    image: ollama/ollama:latest
    container_name: bms-ollama-init
    depends_on:
      ollama-gpu:
        condition: service_healthy
        required: false
      ollama-cpu:
        condition: service_healthy
        required: false
    environment:
      - OLLAMA_HOST=bms-ollama:11434
      - OLLAMA_MODEL_ID=${OLLAMA_MODEL_ID:-qwen2.5:3b}
    volumes:
      - ./scripts/init-ollama.sh:/init-ollama.sh:ro
    entrypoint: ["/bin/bash", "/init-ollama.sh"]
    restart: "no"

# ── Volumes ───────────────────────────────────────────────────
volumes:
  ollama-models:
    name: bms-ollama-models
