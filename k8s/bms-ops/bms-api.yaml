apiVersion: apps/v1
kind: Deployment
metadata:
  name: bms-api
  namespace: bms-ops
  labels:
    app: bms-api
    app.kubernetes.io/part-of: bms-operations
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bms-api
  template:
    metadata:
      labels:
        app: bms-api
    spec:
      containers:
        - name: bms-api
          image: docker.maf.local/bms-ops/bms-api:2c349d5c
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: bms-config
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
      imagePullSecrets:
        - name: nexus-registry-secret
---
apiVersion: v1
kind: Service
metadata:
  name: bms-api
  namespace: bms-ops
  labels:
    app: bms-api
spec:
  selector:
    app: bms-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
