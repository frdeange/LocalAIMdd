apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bms-shared-services
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: bms-platform
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://gitea.maf.local/kiko/LocalAIMdd.git
    targetRevision: main
    path: k8s/shared-services
  destination:
    server: https://kubernetes.default.svc
    namespace: shared-services
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
